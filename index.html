<!DOCTYPE html>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px; /* هام لترك مسافة في الشاشات الصغيرة */
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 500px; /* أقصى عرض للشاشات الكبيرة */
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { font-size: clamp(3rem, 10vw, 4rem); margin-bottom: 1rem; }

        h1 { 
            font-size: clamp(1.5rem, 5vw, 2rem); 
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .privacy-note {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* حاوية الأزرار - ستتغير بناءً على حجم الشاشة */
        .btn-group {
            display: flex;
            flex-direction: column; /* عمودي في الموبايل */
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4);
        }

        /* تحويل الأزرار لتصبح بجانب بعضها في الشاشات الواسعة */
        @media (min-width: 480px) {
            .btn-group {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .btn { flex: 1; min-width: 200px; }
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .footer b { color: var(--primary); }
    </style>
</head>
